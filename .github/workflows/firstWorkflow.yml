name: First Workflow

on:
  push:
  pull_request:
  workflow_dispatch:

env:
    TOKEN: ${{ secrets.ApiSecret }}
    APP_NAME: GitDemo
    ENVIRONMENT: DEV
jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      
      - uses: actions/checkout@v4
      
      - name: create File
      - run: echo "Dev Ops Training Report" > report.txt
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        
        with:
            name: devops-report
            path: report.txt
      
    

      - name: Print Message
        run: echo "Hello DevOps"

      - name: Aceess Secret
        run: echo $TOKEN
      
      - name: Show Environment Variables
        run: |
            echo "Application Name: $APP_NAME"
            echo "Environment: $ENVIRONMENT"
  test:
    
    needs: build
    runs-on: ubuntu-latest
    steps:
    
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
            name: devops-report
      - name: Display File
        run: cat report.txt
      
      - name: Run Tests
        run: echo "Running Tests"
        
  deploy:
    
    needs: test
    runs-on: ubuntu-latest
    steps:
        - name: Deploy Application
          run: echo "Deploying Application"
    

        
